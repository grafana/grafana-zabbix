name: Plugins - CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    permissions:
      contents: read
      id-token: write
    name: CI
    uses: grafana/plugin-ci-workflows/.github/workflows/ci.yml@ci-cd-workflows/v10.1.0
    with:
      plugin-version-suffix: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
      # Runs Playwright e2e (tests/e2e) against the repo's docker-compose.yml,
      # which brings up a real Zabbix backend + seeded fixtures.
      run-playwright: true
