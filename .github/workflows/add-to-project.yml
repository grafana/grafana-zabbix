name: Add issues to Data Source Plugin team project
on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

permissions:
  contents: read
  id-token: write

jobs:
  add-to-project:
    name: Add issue to project
    runs-on: ubuntu-latest
    steps:
      - id: get-github-token
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        with:
          github_app: grafana-oss-big-tent
      - name: Add to project
        uses: actions/add-to-project@27022a19346d0433f2b9859dd2b69d38f4277808 # main
        with:
          project-url: https://github.com/orgs/grafana/projects/1085
          github-token: ${{ steps.get-github-token.outputs.token }}
