name: Compatibility check
run-name: Grafana API compatibility check

# Runs grafana/plugin-actions/is-compatible (levitate) to detect when the plugin
# uses Grafana frontend APIs that are deprecated or removed in newer Grafana
# versions. This is the real "compatibility" check — distinct from the Zabbix
# integration tests in integration.yml.

on:
  pull_request:
  workflow_dispatch:

jobs:
  compatibilitycheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # needed for the comment-pr step
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Build plugin
        run: yarn build

      - name: Compatibility check
        uses: grafana/plugin-actions/is-compatible@4698961fa64137fcac207108397ebe8a738a33d1 # v1
        with:
          module: './src/module.ts'
          comment-pr: 'yes'
          skip-comment-if-compatible: 'yes'
          fail-if-incompatible: 'no'
          targets: '@grafana/data,@grafana/ui,@grafana/runtime,@grafana/schema'
