apiVersion: 1

# Provisioned Zabbix data source for end-to-end tests. Stable UID so tests can
# navigate to it / provisioned dashboards directly.
datasources:
  - name: Zabbix E2E
    type: alexanderzobnin-zabbix-datasource
    uid: zabbix-e2e
    url: http://zabbix-web:8080/api_jsonrpc.php
    isDefault: true
    jsonData:
      username: Admin
      trends: true
      trendsFrom: '7d'
      trendsRange: '4d'
    secureJsonData:
      password: zabbix
